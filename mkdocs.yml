site_name: Critical Appraisal for Neurologists — Web Edition
site_description: Free original curriculum for stroke-aware critical appraisal. Not a reprint of commercial handbooks.
site_url: https://rkalani1.github.io/CRIT-APP/
repo_url: https://github.com/rkalani1/CRIT-APP
repo_name: rkalani1/CRIT-APP
edit_uri: edit/main/docs/
copyright: >
  Content © 2026 Rizwan Kalani / contributors · CC BY 4.0 · Site code ISC ·
  Educational only — not medical advice or institutional policy.

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Dark mode
    - scheme: slate
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.follow

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.arithmatex:
      generic: true
  - tables
  - toc:
      permalink: true
  - attr_list
  - md_in_html

extra_javascript:
  - javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

extra_css:
  - stylesheets/extra.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/rkalani1/CRIT-APP
  version:
    provider: mike
    default: web-edition

nav:
  - Home: index.md
  - About & originality: about.md
  - Originality audit: ORIGINALITY.md
  - How to use: how-to-use.md
  - Update protocol: update-protocol.md
