  <title id="title">Natural-frequency icon array</title>
  <desc id="desc">A 100-person array shows six red people who experience the outcome with either strategy, two outlined teal people whose outcomes are prevented by the strategy, and 92 gray people with no outcome. This represents eight events without the strategy and six with it, or two fewer per 100.</desc>
