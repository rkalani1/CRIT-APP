<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Fragility index worked example</title>
  <desc id="desc">With 40 unfavorable events among 200 control participants and 22 among 200 treatment participants, the two-sided Fisher exact p-value is 0.0183. Reclassifying three treatment non-events as events gives 25 of 200 and p 0.0572, so the fragility index is 3 for this specified test and direction.</desc>
  <rect width="1200" height="720" rx="28" fill="#f8fafc"/>
  <style>
    text { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; fill: #1e1b4b; }
    .title { font-size: 34px; font-weight: 700; }
    .subtitle { font-size: 21px; fill: #475569; }
    .label { font-size: 20px; font-weight: 650; }
    .small { font-size: 17px; fill: #475569; }
    .value { font-size: 24px; font-weight: 700; }
  </style>
  <text x="70" y="58" class="title">Fragility is test- and direction-specific</text>
  <text x="70" y="91" class="subtitle">Specified example: unfavorable events, equal groups, two-sided Fisher exact test, α = 0.05.</text>
  <rect x="70" y="130" width="480" height="370" rx="22" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="105" y="180" class="title">Reported result</text>
  <text x="105" y="215" class="subtitle">40 vs 22 unfavorable events</text>
  <text x="105" y="259" class="label">Control</text>
  <rect x="105" y="270" width="250" height="34" rx="9" fill="#e2e8f0"/>
  <rect x="105" y="270" width="50.0" height="34" rx="9" fill="#b91c1c"/>
  <text x="373" y="295" class="value">40/200</text>
  <text x="105" y="354" class="label">Treatment</text>
  <rect x="105" y="365" width="250" height="34" rx="9" fill="#e2e8f0"/>
  <rect x="105" y="365" width="27.5" height="34" rx="9" fill="#0f766e"/>
  <text x="373" y="390" class="value">22/200</text>
  <text x="105" y="470" class="value">Fisher p = 0.0183</text>
  <path d="M 575 310 H 625" stroke="#3730a3" stroke-width="5" stroke-linecap="round"/>
  <path d="M 614 296 L 630 310 L 614 324" fill="none" stroke="#3730a3" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="600" y="350" text-anchor="middle" class="small">3 outcomes</text>
  <text x="600" y="374" text-anchor="middle" class="small">reclassified</text>
  <rect x="650" y="130" width="480" height="370" rx="22" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="685" y="180" class="title">Tipping point</text>
  <text x="685" y="215" class="subtitle">40 vs 25 unfavorable events</text>
  <text x="685" y="259" class="label">Control</text>
  <rect x="685" y="270" width="250" height="34" rx="9" fill="#e2e8f0"/>
  <rect x="685" y="270" width="50.0" height="34" rx="9" fill="#b91c1c"/>
  <text x="953" y="295" class="value">40/200</text>
  <text x="685" y="354" class="label">Treatment</text>
  <rect x="685" y="365" width="250" height="34" rx="9" fill="#e2e8f0"/>
  <rect x="685" y="365" width="31.2" height="34" rx="9" fill="#a16207"/>
  <text x="953" y="390" class="value">25/200</text>
  <text x="685" y="470" class="value">Fisher p = 0.0572</text>
  <rect x="150" y="550" width="900" height="105" rx="20" fill="#eef2ff" stroke="#c7d2fe" stroke-width="2"/>
  <text x="600" y="592" text-anchor="middle" class="title">Fragility index = 3</text>
  <text x="600" y="628" text-anchor="middle" class="subtitle">Three treatment non-events changed to events move p from below to above 0.05.</text>
</svg>
